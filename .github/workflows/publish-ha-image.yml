name: Publiceer Home Assistant-image

on:
  workflow_dispatch:
  push:
    tags:
      - "ha-v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Broncode ophalen
        uses: actions/checkout@v6.0.2

      - name: Versie en imagenaam bepalen
        id: info
        shell: bash
        run: |
          echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/dienstenlezer" >> "$GITHUB_OUTPUT"

      - name: QEMU instellen
        uses: docker/setup-qemu-action@v4

      - name: Docker Buildx instellen
        uses: docker/setup-buildx-action@v4

      - name: Aanmelden bij GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: ARM64- en AMD64-image bouwen en publiceren
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64,linux/amd64
          push: true
          build-args: |
            BUILD_VERSION=${{ steps.info.outputs.version }}
            BUILD_ARCH=multi
          tags: |
            ${{ steps.info.outputs.image }}:${{ steps.info.outputs.version }}
            ${{ steps.info.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
